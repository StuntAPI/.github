<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <!-- stunt org README banner — logo + wordmark + tagline on bone -->
  <rect width="1200" height="320" fill="#F7F4EC"/>
  <!-- faint grid -->
  <g stroke="#0E0E0E" stroke-opacity="0.05" stroke-width="1">
    <path d="M0 40 H1200 M0 80 H1200 M0 120 H1200 M0 160 H1200 M0 200 H1200 M0 240 H1200 M0 280 H1200"/>
    <path d="M40 0 V320 M80 0 V320 M120 0 V320 M160 0 V320 M200 0 V320 M240 0 V320"/>
  </g>
  <!-- take-markers -->
  <g font-family="ui-monospace, monospace" font-size="18" fill="#0E0E0E" opacity="0.5">
    <text x="40" y="42">● REC</text>
    <text x="1160" y="42" text-anchor="end">STUNTAPIO</text>
  </g>

  <!-- logo (doubled-S), left, large -->
  <g transform="translate(110,110) scale(3.2)">
    <g id="s-mark">
      <rect x="20" y="12" width="30" height="10"/>
      <rect x="20" y="12" width="10" height="20"/>
      <rect x="20" y="22" width="24" height="10"/>
      <rect x="34" y="22" width="10" height="20"/>
      <rect x="14" y="32" width="30" height="10"/>
    </g>
    <use href="#s-mark" transform="translate(5,5)" fill="#FFD400"/>
    <use href="#s-mark" fill="#0E0E0E"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="400" y="165" font-family="Inter, ui-sans-serif, sans-serif" font-size="96" font-weight="bold" fill="#0E0E0E">stunt</text>
  <text x="404" y="210" font-family="ui-monospace, monospace" font-size="26" fill="#0E0E0E" opacity="0.7">local API simulators</text>
  <text x="404" y="245" font-family="ui-monospace, monospace" font-size="22" fill="#0E0E0E">the safe stand-in for the real thing.</text>

  <!-- footer stripe -->
  <rect x="0" y="296" width="1200" height="24" fill="#FFD400"/>
</svg>
